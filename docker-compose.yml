services:
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    user: root
    networks:
      hermes-net:
        ipv4_address: 172.29.0.10
    command: hermes gateway run
    ports:
      - "8642:8642"
    volumes:
      - hermes-webui_hermes-home:/opt/data
      - ./config.yaml:/opt/data/config.yaml:ro
      - /home/yoav/workspace:/workspace
      - hermes-agent-src:/opt/hermes
      - ./ssh_key:/ssh_key:ro
    env_file:
      - ./.env
    environment:
      - HERMES_HOME=/opt/data
      - API_SERVER_HOST=0.0.0.0
      - TERMINAL_SSH_HOST=dev-container
      - TERMINAL_SSH_USER=dev
      - TERMINAL_SSH_KEY=/ssh_key
      - CAMOFOX_API_KEY=
      - FIRECRAWL_API_KEY=
      - MINIMAX_API_HOST=https://api.minimax.io/
      - MINIMAX_API_KEY=
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
  dev-container:
    image: ghcr.io/phantomic12/dev-container:latest
    user: root
    command: sleep infinity
    volumes:
      - hermes-webui_hermes-home:/home/dev/.hermes
      - /home/yoav/workspace:/workspace
    environment:
      - HERMES_HOME=/home/dev/.hermes
      - SSH_AUTHORIZED_KEYS=ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKK3VMTZbaJprw1Rr5gMvfvV8UIAqsc4ts9tGgSPZAvy hermes-agent-to-dev-container
      - DEV_PASSWORD=hermes-dev123
      - SSH_PORT=2222
      - GH_TOKEN=
      - TAILSCALE_AUTH_KEY=
      - CLOUDFLARE_API_KEY=
      - CLOUDFLARE_ACCOUNT_ID=
      - BROWSER_PROFILE_DIR=/browser-profile
      - BROWSER_RESOLUTION=
      - MINIMAX_API_HOST=https://api.minimax.io/
      - MINIMAX_API_KEY=
    restart: unless-stopped
    networks:
      - hermes-net
    expose:
      - "2222"
  hermes-webui:
    image: ghcr.io/nesquena/hermes-webui:latest
    user: root
    container_name: hermes-webui
    depends_on:
      - hermes-agent
    ports:
      - 8787:8787
    volumes:
      - hermes-webui_hermes-home:/home/hermeswebui/.hermes
      - ./config.yaml:/home/hermeswebui/.hermes/config.yaml:ro
      - /home/yoav/workspace:/workspace
      - hermes-agent-src:/home/hermeswebui/.hermes/hermes-agent
    env_file:
      - ./.env
    environment:
      - HERMES_HOME=/home/hermeswebui/.hermes
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui
      - WANTED_UID=0
      - WANTED_GID=0
    restart: unless-stopped
    networks:
      - hermes-net
networks:
  hermes-net:
    driver: bridge
volumes:
  hermes-webui_hermes-home:
    external: true
  hermes-agent-src:
