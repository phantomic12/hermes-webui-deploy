services:
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    user: root
    command: hermes gateway run
    ports:
      - "8642:8642"
    volumes:
      - hermes-webui_hermes-home:/opt/data
      - ./config.yaml:/opt/data/config.yaml:ro
      - ${HOST_WORKSPACE:-/home/yoav/workspace}:/workspace
    environment:
      - HERMES_HOME=/opt/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    networks:
      - hermes-net

  hermes-webui:
    image: ghcr.io/nesquena/hermes-webui:latest
    container_name: hermes-webui
    depends_on:
      - hermes-agent
    links:
      - hermes-agent
    ports:
      - "8787:8787"
    volumes:
      - hermes-webui_hermes-home:/home/hermeswebui/.hermes
      - ${HERMES_WORKSPACE:-/home/yoav/workspace}:/workspace
    environment:
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui
      - WANTED_UID=${UID:-1000}
      - WANTED_GID=${GID:-1000}
    restart: unless-stopped
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge

volumes:
  hermes-webui_hermes-home:
    external: true
